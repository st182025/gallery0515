<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私のギャラリー</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f0f0f;
            color: #eee;
            font-family: "Segoe UI", sans-serif;
            text-align: center;
        }
        h1 {
            padding: 40px 20px 10px;
            font-size: 2.8em;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            transition: transform 0.3s;
        }
        .gallery img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>🚀 私のプライベートギャラリー</h1>
    <p>URLを知ってる人だけ見られるよ</p>

    <div class="gallery">
        <!-- ここに画像を後で追加します -->
        <img src="https://picsum.photos/600/400?random=1" alt="サンプル1">
        <img src="https://picsum.photos/600/400?random=2" alt="サンプル2">
        <img src="https://picsum.photos/600/400?random=3" alt="サンプル3">
        <img src="https://picsum.photos/600/400?random=4" alt="サンプル4">
    </div>
</body>
</html>
